packages:
  - ./basic
  - ./solid-element
  - ./with-rspack
  - ./with-vanila-extract
  - ./with-vite-pages
  - ./with-vite-tsrx

allowBuilds:
  core-js: false
  esbuild: false
  unrs-resolver: false

minimumReleaseAge: 10080 # 7 days in minutes

overrides:
  chokidar: '>=5'
  handlebars@>=4.0.0 <4.7.9: '>=4.7.9'
  handlebars@>=4.0.0 <=4.7.8: '>=4.7.9'
  handlebars@>=4.6.0 <=4.7.8: '>=4.7.9'
  semver: '>=7'

trustPolicy: no-downgrade
trustPolicyExclude:
  - 'vite@6.4.1'
